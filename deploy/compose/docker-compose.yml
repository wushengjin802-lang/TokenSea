
services:
  tokensea-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TOKENSEA_DB_NAME:-tokensea}
      POSTGRES_USER: ${TOKENSEA_DB_USER:-tokensea}
      POSTGRES_PASSWORD: ${TOKENSEA_DB_PASSWORD:-change-me}
    ports:
      - "${TOKENSEA_POSTGRES_PORT:-39213}:5432"
    volumes:
      - tokensea-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TOKENSEA_DB_USER:-tokensea} -d ${TOKENSEA_DB_NAME:-tokensea}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tokensea-redis:
    image: redis:7-alpine
    ports:
      - "${TOKENSEA_REDIS_PORT:-39214}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tokensea-redis-data:/data

  tokensea-control-plane:
    build: ../../services/control-plane
    environment:
      SERVER_PORT: 39211
      SPRING_DATASOURCE_URL: ${TOKENSEA_DB_URL:-jdbc:postgresql://tokensea-postgres:5432/tokensea}
      SPRING_DATASOURCE_USERNAME: ${TOKENSEA_DB_USER:-tokensea}
      SPRING_DATASOURCE_PASSWORD: ${TOKENSEA_DB_PASSWORD:-change-me}
      SPRING_DATA_REDIS_HOST: tokensea-redis
      SPRING_DATA_REDIS_PORT: 6379
      TOKENSEA_JWT_SECRET: ${TOKENSEA_JWT_SECRET:-change-me-change-me-change-me-change-me}
      TOKENSEA_CRYPTO_KEY: ${TOKENSEA_CRYPTO_KEY:-change-me-change-me-change-me-32bytes}
    ports:
      - "${TOKENSEA_CONTROL_PORT:-39211}:39211"
    depends_on:
      tokensea-postgres:
        condition: service_healthy
      tokensea-redis:
        condition: service_started

  tokensea-gateway-runtime:
    build: ../../services/gateway-runtime
    environment:
      TOKENSEA_CONTROL_BASE: http://tokensea-control-plane:39211
      TOKENSEA_DB_DSN: postgresql://${TOKENSEA_DB_USER:-tokensea}:${TOKENSEA_DB_PASSWORD:-change-me}@tokensea-postgres:5432/${TOKENSEA_DB_NAME:-tokensea}
      TOKENSEA_REDIS_URL: redis://tokensea-redis:6379/0
      TOKENSEA_RUNTIME_ENGINE_URL: http://tokensea-runtime-core:39218
      TOKENSEA_RUNTIME_CORE_BASE: ${TOKENSEA_RUNTIME_CORE_BASE:-http://tokensea-runtime-core:39218}
    ports:
      - "${TOKENSEA_GATEWAY_PORT:-39212}:39212"
    depends_on:
      - tokensea-control-plane
      - tokensea-runtime-core

  tokensea-runtime-core:
    image: ${TOKENSEA_RUNTIME_CORE_IMAGE:-ghcr.io/berriai/litellm:v1.91.0}
    command: ["--port", "39218", "--host", "0.0.0.0"]
    environment:
      LITELLM_MASTER_KEY: ${TOKENSEA_RUNTIME_CORE_KEY:-change-me-runtime-core-key}
      STORE_MODEL_IN_DB: "False"
    ports:
      - "${TOKENSEA_RUNTIME_CORE_PORT:-39218}:39218"
    depends_on:
      tokensea-postgres:
        condition: service_healthy

  tokensea-console:
    build:
      context: ../../apps/console
      args:
        VITE_API_BASE: http://localhost:${TOKENSEA_CONTROL_PORT:-39211}
        VITE_GATEWAY_BASE: http://localhost:${TOKENSEA_GATEWAY_PORT:-39212}
    environment:
      VITE_API_BASE: http://localhost:${TOKENSEA_CONTROL_PORT:-39211}
      VITE_GATEWAY_BASE: http://localhost:${TOKENSEA_GATEWAY_PORT:-39212}
    ports:
      - "${TOKENSEA_CONSOLE_PORT:-39210}:39210"
    depends_on:
      - tokensea-control-plane

  tokensea-prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "${TOKENSEA_PROMETHEUS_PORT:-39215}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tokensea-grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "${TOKENSEA_GRAFANA_PORT:-39216}:3000"
    volumes:
      - tokensea-grafana-data:/var/lib/grafana

volumes:
  tokensea-postgres-data:
  tokensea-redis-data:
  tokensea-grafana-data:
