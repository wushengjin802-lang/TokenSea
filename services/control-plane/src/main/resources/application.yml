server:
  port: 39211
spring:
  application:
    name: tokensea-control-plane
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:39213/tokensea}
    username: ${SPRING_DATASOURCE_USERNAME:tokensea}
    password: ${SPRING_DATASOURCE_PASSWORD:tokensea_change_me}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:39214}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
tokensea:
  jwt-secret: ${TOKENSEA_JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-bytes}
  crypto-key: ${TOKENSEA_CRYPTO_KEY:change-this-32-byte-key-for-aes-gcm!!}
  runtime:
    engine-url: ${TOKENSEA_RUNTIME_ENGINE_URL:http://localhost:39218}
    engine-key: ${TOKENSEA_RUNTIME_ENGINE_KEY:change-me-runtime-master-key}
