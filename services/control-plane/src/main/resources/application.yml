server:
  port: 39211
spring:
  application:
    name: tokensea-control-plane
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:39213/tokensea}
    username: ${SPRING_DATASOURCE_USERNAME:tokensea}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:39214}
      password: ${SPRING_DATA_REDIS_PASSWORD}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
tokensea:
  jwt-secret: ${TOKENSEA_JWT_SECRET}
  crypto-key: ${TOKENSEA_CRYPTO_KEY}
  bootstrap-token: ${TOKENSEA_BOOTSTRAP_TOKEN:}
  budget-currency: ${TOKENSEA_BUDGET_CURRENCY:CNY}
  cors:
    allowed-origins: ${TOKENSEA_CORS_ALLOWED_ORIGINS:http://localhost:39210}
  egress:
    proxy-host: ${TOKENSEA_EGRESS_PROXY_HOST:}
    proxy-port: ${TOKENSEA_EGRESS_PROXY_PORT:18080}
    allowed-hosts: ${TOKENSEA_ALLOWED_EGRESS_HOSTS:}
    allowed-ports: ${TOKENSEA_EGRESS_ALLOWED_PORTS:80,443}
    policy-token: ${TOKENSEA_EGRESS_POLICY_TOKEN:}
  runtime:
    engine-url: ${TOKENSEA_RUNTIME_ENGINE_URL:http://localhost:39218}
    engine-key: ${TOKENSEA_RUNTIME_ENGINE_KEY}
